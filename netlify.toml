[build]
  command = "cd web && npm ci && npm run build"
  publish = "web/dist"

[build.environment]
  NODE_VERSION = "20"
  # Call the API directly so long-running SSE endpoints (e.g. plan generation)
  # are not cut off by Netlify's proxy timeout. The backend allows this origin via CORS.
  VITE_API_URL = "https://nayths-ironman-coach-api.onrender.com"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
