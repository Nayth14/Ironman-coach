services:
  - type: web
    name: nayths-ironman-coach-api
    runtime: docker
    dockerfilePath: ./coaching-lab/Dockerfile
    dockerContext: ./coaching-lab
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        value: https://nayths-ironman-coach.netlify.app,http://localhost:5173
